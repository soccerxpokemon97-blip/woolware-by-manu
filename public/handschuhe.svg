<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <rect width="600" height="450" fill="#F0E6D3"/>

  <!-- Left mitten -->
  <g transform="translate(150, 60)">
    <!-- Cuff -->
    <rect x="30" y="250" width="120" height="60" rx="8" fill="#B7573A"/>
    <line x1="30" y1="265" x2="150" y2="265" stroke="#8B3A2A" stroke-width="2"/>
    <line x1="30" y1="280" x2="150" y2="280" stroke="#8B3A2A" stroke-width="2"/>
    <line x1="30" y1="295" x2="150" y2="295" stroke="#8B3A2A" stroke-width="2"/>

    <!-- Main hand -->
    <path d="M30 260 L30 120 Q30 50 90 50 Q150 50 150 120 L150 260" fill="#B7573A"/>

    <!-- Thumb -->
    <path d="M30 200 Q-20 180 -15 130 Q-10 90 20 100 L30 140" fill="#B7573A"/>

    <!-- Knit pattern lines -->
    <line x1="55" y1="80" x2="55" y2="250" stroke="#8B3A2A" stroke-width="1.5" opacity="0.4"/>
    <line x1="90" y1="60" x2="90" y2="250" stroke="#8B3A2A" stroke-width="1.5" opacity="0.4"/>
    <line x1="125" y1="80" x2="125" y2="250" stroke="#8B3A2A" stroke-width="1.5" opacity="0.4"/>

    <!-- Horizontal knit lines -->
    <line x1="35" y1="120" x2="145" y2="120" stroke="#8B3A2A" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="160" x2="145" y2="160" stroke="#8B3A2A" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="200" x2="145" y2="200" stroke="#8B3A2A" stroke-width="1" opacity="0.3"/>

    <!-- Snowflake decoration -->
    <g transform="translate(90, 170)" stroke="#FAF3E8" stroke-width="2.5">
      <line x1="0" y1="-20" x2="0" y2="20"/>
      <line x1="-20" y1="0" x2="20" y2="0"/>
      <line x1="-14" y1="-14" x2="14" y2="14"/>
      <line x1="14" y1="-14" x2="-14" y2="14"/>
      <circle cx="0" cy="0" r="4" fill="#FAF3E8"/>
    </g>
  </g>

  <!-- Right mitten -->
  <g transform="translate(310, 80) scale(-1,1) translate(-180,0)">
    <!-- Cuff -->
    <rect x="30" y="250" width="120" height="60" rx="8" fill="#2D5A3D"/>
    <line x1="30" y1="265" x2="150" y2="265" stroke="#1a3d28" stroke-width="2"/>
    <line x1="30" y1="280" x2="150" y2="280" stroke="#1a3d28" stroke-width="2"/>
    <line x1="30" y1="295" x2="150" y2="295" stroke="#1a3d28" stroke-width="2"/>

    <!-- Main hand -->
    <path d="M30 260 L30 120 Q30 50 90 50 Q150 50 150 120 L150 260" fill="#2D5A3D"/>

    <!-- Thumb -->
    <path d="M30 200 Q-20 180 -15 130 Q-10 90 20 100 L30 140" fill="#2D5A3D"/>

    <!-- Knit pattern lines -->
    <line x1="55" y1="80" x2="55" y2="250" stroke="#1a3d28" stroke-width="1.5" opacity="0.4"/>
    <line x1="90" y1="60" x2="90" y2="250" stroke="#1a3d28" stroke-width="1.5" opacity="0.4"/>
    <line x1="125" y1="80" x2="125" y2="250" stroke="#1a3d28" stroke-width="1.5" opacity="0.4"/>

    <!-- Horizontal knit lines -->
    <line x1="35" y1="120" x2="145" y2="120" stroke="#1a3d28" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="160" x2="145" y2="160" stroke="#1a3d28" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="200" x2="145" y2="200" stroke="#1a3d28" stroke-width="1" opacity="0.3"/>

    <!-- Snowflake decoration -->
    <g transform="translate(90, 170)" stroke="#FAF3E8" stroke-width="2.5">
      <line x1="0" y1="-20" x2="0" y2="20"/>
      <line x1="-20" y1="0" x2="20" y2="0"/>
      <line x1="-14" y1="-14" x2="14" y2="14"/>
      <line x1="14" y1="-14" x2="-14" y2="14"/>
      <circle cx="0" cy="0" r="4" fill="#FAF3E8"/>
    </g>
  </g>

  <!-- Yarn ball decoration -->
  <circle cx="480" cy="360" r="30" fill="#8B6F5E"/>
  <path d="M455 345 Q480 330 505 345" stroke="#5C3D2E" stroke-width="1.5" fill="none"/>
  <path d="M458 355 Q480 340 502 355" stroke="#5C3D2E" stroke-width="1.5" fill="none"/>
  <path d="M455 365 Q480 350 505 365" stroke="#5C3D2E" stroke-width="1.5" fill="none"/>
  <path d="M460 375 Q480 360 500 375" stroke="#5C3D2E" stroke-width="1.5" fill="none"/>
  <line x1="480" y1="390" x2="520" y2="410" stroke="#8B6F5E" stroke-width="2"/>
</svg>
